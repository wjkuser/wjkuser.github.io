    <path d="M282 148c44 6 78 20 104 42" stroke="#b98520" stroke-width="4"/>
  </g>
  <g>
    <circle cx="214" cy="220" r="12" fill="#0f766e"/>
    <circle cx="486" cy="246" r="12" fill="#8b2f3c"/>
    <circle cx="454" cy="376" r="12" fill="#275b8c"/>
    <circle cx="282" cy="148" r="12" fill="#b98520"/>
  </g>
  <g font-family="ui-sans-serif, system-ui, sans-serif" letter-spacing="0">
    <text x="118" y="126" fill="#0b4f49" font-size="18" font-weight="700">Video</text>
    <text x="118" y="158" fill="#627071" font-size="15">generation</text>
    <text x="118" y="184" fill="#627071" font-size="15">temporal models</text>
    <text x="408" y="138" fill="#8b2f3c" font-size="18" font-weight="700">Multimodal</text>
