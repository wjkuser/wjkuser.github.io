<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 620" role="img" aria-labelledby="title desc">
  <title id="title">Abstract research map</title>
  <desc id="desc">Connected notes and axes representing research directions.</desc>
  <defs>
    <linearGradient id="paper" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fffdf7"/>
      <stop offset="1" stop-color="#eef7f3"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#1e2528" flood-opacity=".12"/>
    </filter>
  </defs>
  <rect width="720" height="620" fill="url(#paper)"/>
  <path d="M96 112h528M96 198h528M96 284h528M96 370h528M96 456h528M96 542h528" stroke="#d9ddd5" stroke-width="1"/>
  <path d="M158 84v456M282 84v456M406 84v456M530 84v456" stroke="#e4e1d8" stroke-width="1"/>
  <g filter="url(#soft)">
    <rect x="86" y="84" width="204" height="136" rx="8" fill="#ffffff"/>
    <rect x="376" y="94" width="234" height="152" rx="8" fill="#ffffff"/>
    <rect x="152" y="330" width="220" height="142" rx="8" fill="#ffffff"/>
    <rect x="430" y="376" width="152" height="96" rx="8" fill="#ffffff"/>
  </g>
