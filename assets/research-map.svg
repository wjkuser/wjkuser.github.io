    <text x="408" y="196" fill="#627071" font-size="15">alignment</text>
    <text x="184" y="374" fill="#275b8c" font-size="18" font-weight="700">Efficiency</text>
    <text x="184" y="406" fill="#627071" font-size="15">sparse attention</text>
    <text x="184" y="432" fill="#627071" font-size="15">fast sampling</text>
    <text x="462" y="414" fill="#1e2528" font-size="16" font-weight="700">Embodied</text>
    <text x="462" y="442" fill="#627071" font-size="14">control</text>
